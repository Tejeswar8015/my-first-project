<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bachelor Kitchen App</title>
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#fff; }
    button { cursor:pointer; }

    /* SPLASH SCREEN */
    .splash-screen {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background-color:#000; display:flex; justify-content:center; align-items:center;
      flex-direction: column; opacity:1; transition: opacity 1s ease;
      z-index:9999; color:#fff;
    }
    .splash-screen.fade-out { opacity:0; }

    .logo {
      width:150px; height:150px; margin-bottom:20px;
    }

    .animated-text {
      font-size:2rem; font-weight:bold; display:flex; flex-wrap:wrap; justify-content:center;
    }

    .animated-text span {
      margin:0 2px; opacity:0; transition: opacity 0.5s;
    }

    .animated-text span.visible { opacity:1; }

    /* LOGIN PAGE */
    .login-page { display:flex; flex-direction:column; align-items:center; margin-top:100px; }
    .login-page input { margin:5px; padding:8px; font-size:16px; }
    .login-page button { margin:10px; padding:10px 20px; font-size:16px; }

    /* FOOD SELECTION */
    .food-page { display:flex; flex-direction:column; align-items:center; margin-top:50px; }
    .food-list { display:flex; flex-wrap:wrap; justify-content:center; }
    .food-item { margin:10px; padding:10px; border:1px solid #ccc; width:150px; text-align:center; cursor:pointer; }
    .food-item.selected { border:2px solid green; background-color:#e0ffe0; }

    /* PAYMENT PAGE */
    .payment-page { display:flex; flex-direction:column; align-items:center; margin-top:50px; }
    .payment-page button { margin-top:20px; padding:10px 20px; font-size:16px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [stage, setStage] = useState('splash'); // splash -> login -> food -> payment

      return (
        <div>
          {stage==='splash' && <Splash onFinish={()=>setStage('login')} />}
          {stage==='login' && <Login onLogin={()=>setStage('food')} />}
          {stage==='food' && <FoodSelection onProceed={()=>setStage('payment')} />}
          {stage==='payment' && <Payment />}
        </div>
      );
    }

    // SPLASH SCREEN
    function Splash({onFinish}) {
      const text = "Welcome to Bachelor Kitchen".split('');
      const [visibleCount, setVisibleCount] = useState(0);

      useEffect(() => {
        const totalDuration = 10000; // 10 sec
        const intervalTime = totalDuration / text.length;
        const interval = setInterval(() => {
          setVisibleCount(prev => {
            if(prev >= text.length-1){
              clearInterval(interval);
              setTimeout(onFinish,500); // small delay then go to login
            }
            return prev + 1;
          });
        }, intervalTime);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="splash-screen">
          <img src="https://via.placeholder.com/150.png?text=Logo" alt="Logo" className="logo"/>
          <div className="animated-text">
            {text.map((c,i)=>(
              <span key={i} className={i<visibleCount ? 'visible':''} style={{color:`hsl(${i*18},80%,60%)`}}>{c}</span>
            ))}
          </div>
        </div>
      )
    }

    // LOGIN PAGE
    function Login({onLogin}) {
      const [user,setUser] = useState('');
      const [pass,setPass] = useState('');
      return (
        <div className="login-page">
          <h1>Login</h1>
          <input type="text" placeholder="Username" value={user} onChange={e=>setUser(e.target.value)} />
          <input type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} />
          <button onClick={onLogin}>Login</button>
        </div>
      )
    }

    // FOOD SELECTION PAGE
    function FoodSelection({onProceed}) {
      const foods = ["Pizza","Burger","Pasta","Salad","Sushi","Fries"];
      const [selected,setSelected] = useState([]);
      const toggle=(item)=>{
        setSelected(prev => prev.includes(item)? prev.filter(f=>f!==item) : [...prev,item]);
      }
      return (
        <div className="food-page">
          <h1>Select Your Food</h1>
          <div className="food-list">
            {foods.map(f=>(
              <div key={f} className={`food-item ${selected.includes(f)? 'selected':''}`} onClick={()=>toggle(f)}>
                {f}
              </div>
            ))}
          </div>
          <button onClick={onProceed} disabled={selected.length===0}>Proceed to Payment</button>
        </div>
      )
    }

    // PAYMENT PAGE
    function Payment() {
      const handlePayment=()=> alert("Payment Successful!");
      return (
        <div className="payment-page">
          <h1>Payment</h1>
          <button onClick={handlePayment}>Pay Now</button>
        </div>
      )
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
