
      height: auto;<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RedBus Login</title>

<style>
/* ===== RESET ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* ===== LAYOUT ===== */
.container {
  display: flex;
  height: 100vh;
}

/* LEFT SECTION */
.left {
  flex: 1;
  background: #d84e55;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.left h1 {
  font-size: 60px;
  margin: 0;
}

.left p {
  font-size: 18px;
  margin-top: 10px;
}

/* RIGHT SECTION */
.right {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* LOGIN BOX */
.login-box {
  background: white;
  padding: 40px;
  border-radius: 10px;
  width: 320px;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

.login-box h2 {
  margin-bottom: 20px;
  text-align: center;
}

.login-box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

.login-box button {
  width: 100%;
  padding: 12px;
  background: #d84e55;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
  font-size: 16px;
}

.login-box button:hover {
  background: #c43e45;
}

.signup {
  text-align: center;
  margin-top: 10px;
  font-size: 14px;
}

.signup a {
  color: #d84e55;
  text-decoration: none;
}

/* ERROR MESSAGE */
#error {
  color: red;
  text-align: center;
  font-size: 13px;
}
</style>

</head>

<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <h1>redBus</h1>
    <p>India's No.1 Bus Booking Platform</p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">

    <div class="login-box">

      <h2>Login</h2>

      <input type="text" id="user" placeholder="Email / Mobile">
      <input type="password" id="pass" placeholder="Password">

      <p id="error"></p>

      <button onclick="login()">Login</button>

      <div class="signup">
        New user? <a href="#">Create account</a>
      </div>

    </div>

  </div>

</div>

<script>
function login() {
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;
  let error = document.getElementById("error");

  if (user === "" || pass === "") {
    error.innerText = "Please fill all fields!";
    return;
  }

  if (pass.length < 4) {
    error.innerText = "Password must be at least 4 characters!";
    return;
  }

  error.style.color = "green";
  error.innerText = "Login successful (UI only)";
}
</script>

</body>
</html>
